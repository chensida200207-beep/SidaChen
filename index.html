<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseBand X Demo</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b0b0b;color:#fff}
.wrap{max-width:1100px;margin:auto;padding:60px 24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.badge{color:#aaa;letter-spacing:3px;text-transform:uppercase;font-size:12px}
h1{font-size:64px;margin:10px 0}
p{color:#ccc;font-size:20px;line-height:1.6}
.btn{display:inline-block;margin-top:24px;padding:14px 24px;background:#fff;color:#000;border-radius:14px;text-decoration:none;font-weight:bold}
.card{border:1px solid #333;border-radius:28px;padding:36px;background:#111}
.big{font-size:72px}
.score{font-size:42px;font-weight:bold;margin-top:20px}
.muted{color:#999}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
.stat{background:#1a1a1a;padding:18px;border-radius:18px}
</style>
</head>
<body>
<div class="wrap">
<div class="grid">
<div>
<div class="badge">Smart Wearable</div>
<h1>PulseBand X</h1>
<p>Track heart rate, sleep, stress and workouts with one sleek AI-powered fitness band.</p>
<a class="btn" href="#">Buy Now</a>
</div>
<div class="card">
<div class="big">⌚</div>
<div class="score">98%</div>
<div class="muted">Recovery Score</div>
<div class="stats">
<div class="stat">Heart Rate<br><strong>72 bpm</strong></div>
<div class="stat">Sleep<br><strong>8h 14m</strong></div>
</div>
</div>
</div>
</div>
</body>
</html>
